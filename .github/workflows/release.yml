name: Build Signed Release AAB

on:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    runs-on: ubuntu-latest

    env:
      ANDROID_UPLOAD_KEYSTORE_PATH: ${{ github.workspace }}/keystore/croniot-android-upload-keystore.p12
      ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
      ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
      ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode upload keystore
        run: |
          mkdir -p "$(dirname "$ANDROID_UPLOAD_KEYSTORE_PATH")"
          echo "${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}" | base64 --decode > "$ANDROID_UPLOAD_KEYSTORE_PATH"

      - name: Verify keystore contents
        run: |
          keytool -list -v \
            -keystore "$ANDROID_UPLOAD_KEYSTORE_PATH" \
            -storetype PKCS12 \
            -storepass "$ANDROID_UPLOAD_KEYSTORE_PASSWORD"
      - name: Clean
        run: ./gradlew clean

      - name: Build signed Release AAB
        run: ./gradlew :composeApp:bundleRelease --stacktrace --info

      - name: Inspect AAB outputs
        run: |
          echo "AABs encontrados:"
          find . -name "*.aab" -type f | sort
          echo ""
          echo "Contenido de composeApp:"
          find composeApp -maxdepth 3 -type f | sort

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-signed
          path: composeApp/build/outputs/bundle/release/composeApp-release.aab
          if-no-files-found: error
          retention-days: 30
  upload-play:
    runs-on: ubuntu-latest
    needs: build-release

    steps:
      - name: Download signed AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: release-aab-signed
          path: artifacts

      - name: Inspect downloaded artifacts
        run: |
          echo "Artifacts descargados:"
          find artifacts -type f | sort

      - name: Upload to Google Play Internal
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.croniot.android
          releaseFiles: artifacts/composeApp-release.aab
          track: internal
          status: completed
