name: Build & Sign Release AAB

on:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release AAB
        run: ./gradlew :composeApp:bundleRelease --stacktrace

      # 🔍 Verificación REAL de outputs (muy útil en KMP)
      - name: Inspect AAB outputs
        run: |
          echo "Buscando AAB generado..."
          find . -name "*.aab" -type f

          echo ""
          echo "Contenido de composeApp:"
          find composeApp -type f | sort

      - name: Sign AAB
        uses: r0adkll/sign-android-release@v1
        id: sign_aab
        with:
          releaseDirectory: composeApp/release
          signingKeyBase64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-signed
          path: ${{ steps.sign_aab.outputs.signedReleaseFile }}
          retention-days: 30
