name: Android CI

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle (with cache)
        uses: gradle/actions/setup-gradle@v3

      - name: Build + Unit Tests + Lint
        run: ./gradlew assembleDebug testDebugUnitTest lintDebug --stacktrace

      - name: Screenshot tests (Roborazzi)
        id: screenshot_tests
        run: ./gradlew verifyRoborazziDebug
        continue-on-error: true

      - name: Generate visual diffs
        if: steps.screenshot_tests.outcome == 'failure'
        run: ./gradlew compareRoborazziDebug

      - name: Upload screenshot diffs
        if: steps.screenshot_tests.outcome == 'failure'
        id: upload_diffs
        uses: actions/upload-artifact@v4
        with:
          name: roborazzi-diffs-${{ github.run_id }}
          path: '**/build/outputs/roborazzi/**'

      - name: Comment PR with diff link
        if: steps.screenshot_tests.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const artifactUrl = '${{ steps.upload_diffs.outputs.artifact-url }}';
            const body = [
              '## Screenshot regressions detected',
              '',
              'One or more screenshots have changed. Review the diffs and decide:',
              '',
              '- **Unintended change** → fix the code and re-push.',
              '- **Intentional change** → run `./gradlew recordRoborazziDebug` locally, commit the updated PNGs, and re-push.',
              '',
              `[Download diff images](${artifactUrl})`,
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail build if screenshots changed
        if: steps.screenshot_tests.outcome == 'failure'
        run: exit 1

      #- name: Detekt
      #  run: ./gradlew detekt

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: composeApp-debug-apk
          path: composeApp/build/outputs/apk/debug/*.apk